version: "3.9"

services:
  app:
    build:
      context: ../..
      dockerfile: artifacts/restaurant-qr/Dockerfile
      args:
        DATABASE_URL: ${DATABASE_URL}
        NEXTAUTH_URL: ${NEXTAUTH_URL}
        NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
    image: qrmenu-app:latest
    container_name: qrmenu-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      SESSION_SECRET: ${SESSION_SECRET}
      NODE_ENV: production
      APP_VERSION: ${APP_VERSION:-1.0.0}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - qrmenu-net

  db:
    image: postgres:16-alpine
    container_name: qrmenu-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: qrmenu
      POSTGRES_USER: ${DB_USER:-qrmenu}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD required}
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-qrmenu} -d qrmenu"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - qrmenu-net

  # Optional: Nginx reverse proxy (use if not using Dokploy's built-in proxy)
  # nginx:
  #   image: nginx:alpine
  #   container_name: qrmenu-nginx
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
  #   depends_on:
  #     - app
  #   networks:
  #     - qrmenu-net

volumes:
  pg-data:

networks:
  qrmenu-net:
    driver: bridge
